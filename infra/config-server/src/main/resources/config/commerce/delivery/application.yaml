server:
  port: 0

spring:
  application:
    name: delivery
  datasource:
    url: jdbc:postgresql://localhost:5432/smart_home
    username: dbuser
    password: "12345"
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: delivery
  sql:
    init:
      mode: always

delivery:
  coefficient:
    base-cost: 5.0
    address-1: 1
    address-2: 2
    fragile: 0.2
    weight: 0.3
    volume: 0.2
    delivery-address: 0.2