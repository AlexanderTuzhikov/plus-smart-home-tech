server:
  port: 0

spring:
  application:
    name: shopping-cart
  datasource:
    url: jdbc:postgresql://localhost:5432/smart_home
    username: dbuser
    password: "12345"
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: shopping_cart
  sql:
    init:
      mode: always