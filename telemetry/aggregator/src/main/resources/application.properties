#Aggregator
server.port=8082

#KafkaProduser
spring.kafka.producer.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=ru.practicum.kafka.serializer.AvroSerializer
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.acks=all
spring.kafka.producer.properties.batch.size=16384
spring.kafka.producer.properties.linger.ms=5

#KafkaConsumer
spring.kafka.consumer.bootstrap-servers=localhost:9092
spring.kafka.consumer.group.id=aggregator-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=ru.practicum.kafka.deserializer.SensorEventDeserializer
spring.kafka.consumer.enable.auto.commit=false
spring.kafka.consumer.auto.offset.reset=latest

#Logging
logging.level.web=debug
logging.level.kafka=info
logging.level.root=info

#TelemetryTopics
telemetry.sensors.v1.topic=telemetry.sensors.v1
telemetry.hubs.v1.topic=telemetry.hubs.v1
telemetry.snapshots.v1.topic=telemetry.snapshots.v1

