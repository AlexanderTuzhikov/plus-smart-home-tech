#Collector
server.port=8080
grpc.server.port=59091

#KafkaProduser
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.value-serializer=ru.practicum.kafka.serializer.AvroSerializer
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.acks=all
spring.kafka.producer.properties.batch.size=16384
spring.kafka.producer.properties.linger.ms=5

#Logging
logging.level.web=debug
logging.level.kafka=info
logging.level.root=info

#TelemetryTopics
telemetry.sensors.v1.topic=telemetry.sensors.v1
telemetry.hubs.v1.topic=telemetry.hubs.v1


